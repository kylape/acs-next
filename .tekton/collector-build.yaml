apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: collector-acs-next-build
  namespace: acs-next
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
spec:
  description: Build and push collector with NATS support
  params:
    - name: git-url
      type: string
      default: "http://forgejo.forgejo.svc:3000/devadmin/acs-next.git"
    - name: git-revision
      type: string
      default: "main"
    - name: image-tag
      type: string
      default: "dev"
  workspaces:
    - name: source
  tasks:
    - name: clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      params:
        - name: URL
          value: $(params.git-url)
        - name: REVISION
          value: $(params.git-revision)
        - name: DELETE_EXISTING
          value: "true"
        - name: SUBMODULES
          value: "false"
        - name: DEPTH
          value: "1"
      workspaces:
        - name: output
          workspace: source
    - name: clone-submodules
      runAfter: [clone]
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: clone-required-submodules
            image: alpine/git:latest
            workingDir: $(workspaces.source.path)/collector
            script: |
              #!/bin/sh
              set -ex
              # Clone required submodules directly (not registered with parent repo)
              # 1. falcosecurity-libs - eBPF driver (pinned to StackRox's current version)
              rm -rf falcosecurity-libs
              git clone https://github.com/stackrox/falcosecurity-libs falcosecurity-libs
              cd falcosecurity-libs && git checkout af2b6161c6060ff47b843d9ff129b9de2ed03a35 && cd ..
              # 2. stackrox protos - for SignalStreamMessage definitions (pinned version)
              rm -rf collector/proto/third_party/stackrox
              git clone --filter=blob:none --sparse https://github.com/stackrox/stackrox collector/proto/third_party/stackrox
              cd collector/proto/third_party/stackrox
              git checkout b7db2fabacd4c38c6e21ef586d13b9f57282ec44
              git sparse-checkout set proto
      workspaces:
        - name: source
          workspace: source
    - name: build-and-push
      runAfter: [clone-submodules]
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      params:
        - name: IMAGE
          value: "registry-dev-registry.apps.rosa.kl-01-29-additi.uxca.p3.openshiftapps.com/acs-next/collector:$(params.image-tag)"
        - name: DOCKERFILE
          value: "./collector/container/Dockerfile.acs-next"
        - name: CONTEXT
          value: "./collector"
        - name: TLS_VERIFY
          value: "false"
        - name: FORMAT
          value: "oci"
      workspaces:
        - name: source
          workspace: source
