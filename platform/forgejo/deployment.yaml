apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo
  namespace: forgejo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: forgejo
  template:
    metadata:
      labels:
        app: forgejo
    spec:
      containers:
        - name: forgejo
          image: codeberg.org/forgejo/forgejo:8-rootless
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: FORGEJO__server__ROOT_URL
              value: "http://forgejo.forgejo.svc:3000/"
            - name: FORGEJO__server__DOMAIN
              value: "forgejo.forgejo.svc"
            - name: FORGEJO__database__DB_TYPE
              value: "sqlite3"
            - name: FORGEJO__service__DISABLE_REGISTRATION
              value: "false"
            - name: FORGEJO__service__REQUIRE_SIGNIN_VIEW
              value: "false"
            - name: GITEA_WORK_DIR
              value: "/var/lib/gitea"
          volumeMounts:
            - name: data
              mountPath: /var/lib/gitea
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: forgejo-data
