---
# EventListener
apiVersion: triggers.tekton.dev/v1beta1
kind: EventListener
metadata:
  name: forgejo-listener
  namespace: acs-next
spec:
  serviceAccountName: pipeline
  triggers:
    - triggerRef: broker-push-trigger
    - triggerRef: admission-controller-push-trigger
    - triggerRef: runtime-evaluator-push-trigger
    - triggerRef: collector-build-push-trigger
    - triggerRef: collector-nats-push-trigger
    - triggerRef: api-push-trigger
  resources:
    kubernetesResource:
      spec:
        template:
          spec:
            containers:
              - resources:
                  requests:
                    memory: "64Mi"
                    cpu: "50m"
                  limits:
                    memory: "128Mi"
                    cpu: "100m"
