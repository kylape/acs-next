apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: acs-next-push-binding
  namespace: acs-next
spec:
  params:
    - name: git-revision
      value: $(body.after)
    - name: git-url
      value: $(body.repository.clone_url)
---
# Broker
apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerTemplate
metadata:
  name: broker-pipeline-template
  namespace: acs-next
spec:
  params:
    - name: git-revision
    - name: git-url
  resourcetemplates:
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: broker-test-
      spec:
        pipelineRef:
          name: broker-test
        params:
          - name: git-url
            value: $(tt.params.git-url)
          - name: git-revision
            value: $(tt.params.git-revision)
        workspaces:
          - name: source
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                resources:
                  requests:
                    storage: 1Gi
                storageClassName: gp3-csi
    - apiVersion: tekton.dev/v1
      kind: PipelineRun
      metadata:
        generateName: broker-build-
      spec:
        pipelineRef:
          name: broker-build
        params:
          - name: git-url
            value: $(tt.params.git-url)
          - name: git-revision
            value: $(tt.params.git-revision)
        taskRunTemplate:
          podTemplate:
            nodeSelector:
              kubernetes.io/arch: amd64
        workspaces:
          - name: source
            volumeClaimTemplate:
              spec:
                accessModes: [ReadWriteOnce]
                resources:
                  requests:
                    storage: 1Gi
                storageClassName: gp3-csi
---
apiVersion: triggers.tekton.dev/v1beta1
kind: Trigger
metadata:
  name: broker-push-trigger
  namespace: acs-next
spec:
  bindings:
    - ref: acs-next-push-binding
  template:
    ref: broker-pipeline-template
  interceptors:
    - name: "filter-broker-paths"
      ref:
        name: "cel"
      params:
        - name: "filter"
          value: >-
            body.commits.exists(c,
              c.modified.exists(f, f.startsWith('broker/'))
              || c.added.exists(f, f.startsWith('broker/'))
              || c.removed.exists(f, f.startsWith('broker/'))
            )
---
