  template:
    ref: admission-controller-pipeline-template
  interceptors:
    - name: "filter-admission-controller-paths"
      ref:
        name: "cel"
      params:
        - name: "filter"
          value: >-
            body.commits.exists(c,
              c.modified.exists(f, f.startsWith('admission-controller/') || f.startsWith('apis/'))
              || c.added.exists(f, f.startsWith('admission-controller/') || f.startsWith('apis/'))
              || c.removed.exists(f, f.startsWith('admission-controller/') || f.startsWith('apis/'))
            )
