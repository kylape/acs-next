apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: acs-admission-controller
webhooks:
  - name: admission-controller.acs-next.svc
    admissionReviewVersions: ["v1"]
    sideEffects: None
    timeoutSeconds: 10
    failurePolicy: Ignore
    clientConfig:
      service:
        name: acs-admission-controller
        namespace: acs-next
        path: /validate
        port: 443
      caBundle: 
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
        scope: Namespaced
    namespaceSelector:
      matchLabels:
        acs-next.stackrox.io/enforce: "true"
