apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: acs-admission-controller
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "patch"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: acs-admission-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: acs-admission-controller
subjects:
  - kind: ServiceAccount
    name: acs-admission-controller
    namespace: acs-next
