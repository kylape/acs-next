apiVersion: apps/v1
kind: Deployment
metadata:
  name: acs-runtime-evaluator
  namespace: acs-next
  labels:
    app: acs-runtime-evaluator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: acs-runtime-evaluator
  template:
    metadata:
      labels:
        app: acs-runtime-evaluator
    spec:
      serviceAccountName: acs-runtime-evaluator
      containers:
        - name: runtime-evaluator
          image: registry-dev-registry.apps.rosa.kl-01-29-additi.uxca.p3.openshiftapps.com/acs-next/runtime-evaluator:dev
          imagePullPolicy: Always
          env:
            - name: NATS_URL
              value: nats://acs-broker.acs-next.svc:4222
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
